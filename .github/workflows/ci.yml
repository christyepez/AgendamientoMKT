name: CI

on:
  pull_request:
    branches: [dev, test, prod]
  push:
    branches: [dev, test, prod]

permissions:
  contents: read

env:
  MSSQL_SA_PASSWORD: CiOnly_StrongPassword_2026!
  JWT_KEY: CI_ONLY_CHANGE_THIS_KEY_32_BYTES_MINIMUM_2026
  ADMIN_PASSWORD: CiOnly.Admin.Password.2026!

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate required documentation
        shell: bash
        run: |
          set -euo pipefail
          test -s README.md
          test -s docs/architecture/arquitectura-modulo-booking-marketing.md

      - name: Validate Docker Compose when present
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(docker-compose.yml compose.yml deploy/docker-compose.*.yml)
          for file in "${files[@]}"; do
            docker compose -f "$file" config --quiet
          done

      - name: Build and test .NET when present
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t solutions < <(find . -name '*.sln' -o -name '*.slnx')
          if (( ${#solutions[@]} > 0 )); then
            dotnet restore "${solutions[0]}"
            dotnet build "${solutions[0]}" --no-restore --configuration Release
            dotnet test "${solutions[0]}" --no-build --configuration Release
          fi

      - name: Build and test frontend when present
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f src/AgendamientoMKT.Web/pnpm-lock.yaml ]]; then
            corepack enable
            cd src/AgendamientoMKT.Web
            pnpm install --frozen-lockfile
            pnpm lint
            pnpm typecheck
            pnpm build
          fi
