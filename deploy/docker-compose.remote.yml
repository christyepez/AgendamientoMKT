services:
  api:
    image: ${IMAGE_PREFIX:-ghcr.io/christyepez/agendamientomkt}-api:${IMAGE_TAG:?Configure IMAGE_TAG}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      AGENDAMIENTO_MASTER_KEY: ${AGENDAMIENTO_MASTER_KEY:?Configure AGENDAMIENTO_MASTER_KEY}
      ENCRYPTED_SECRETS_FILE: /app/config/secrets.aes256.json
      EncryptedSecrets__Required: "true"
      Database__Initialize: ${DATABASE_INITIALIZE:-true}
      AllowedOrigins__0: ${PUBLIC_URL:?Configure PUBLIC_URL}
    volumes:
      - ${SECRETS_FILE:?Configure SECRETS_FILE}:/app/config/secrets.aes256.json:ro
    networks: [internal, requirements-network]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: ${IMAGE_PREFIX:-ghcr.io/christyepez/agendamientomkt}-web:${IMAGE_TAG:?Configure IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api, web]
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8088}:80"
    networks: [internal]

networks:
  internal:
  requirements-network:
    external: true
    name: ${REQUIREMENTS_NETWORK:-requirements-platform_default}
