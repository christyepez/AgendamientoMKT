name: agendamiento-mkt

# Este proyecto reutiliza la instancia SQL Server del Docker Compose de
# requirements-platform. No crea un segundo motor de base de datos.
services:
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: agendamiento-mkt-sqlserver-init
    restart: "no"
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Configure la misma contraseña de SQL Server en .env}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-AgendamientoMKT}
      MSSQL_HOST: ${MSSQL_HOST:-requirements-sqlserver}
    volumes:
      - ./deploy/sql/init.sql:/scripts/init.sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        /opt/mssql-tools18/bin/sqlcmd
        -S "$${MSSQL_HOST}"
        -U sa
        -P "$${MSSQL_SA_PASSWORD}"
        -C
        -b
        -v DatabaseName="$${MSSQL_DATABASE}"
        -i /scripts/init.sql
    networks:
      - requirements-network

networks:
  requirements-network:
    external: true
    name: ${REQUIREMENTS_NETWORK:-requirements-platform_default}

